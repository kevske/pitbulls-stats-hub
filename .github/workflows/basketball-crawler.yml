name: BasketballBund Crawler

on:
  schedule:
    # Run every second night at 2:00 AM (same as original crawler)
    - cron: '0 2 */2 * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: read
  actions: write    # für den Keepalive-API-Aufruf (workflow enable)

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('crawler/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r crawler/requirements.txt

    - name: Check connectivity
      run: |
        echo "Testing connectivity to basketball-bund.net..."
        curl -sS -I https://www.basketball-bund.net >/dev/null || echo "WARNING: Connection to basketball-bund.net failed"
        echo "SUPABASE_URL secret: ${{ secrets.SUPABASE_URL && 'SET' || 'NOT_SET' }}"
        echo "SUPABASE_KEY secret: ${{ secrets.SUPABASE_KEY && 'SET' || 'NOT_SET' }}"

    - name: Run crawler with retry logic
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
      working-directory: ./crawler
      run: |
        # Retry for transient network issues; the step must FAIL if all
        # attempts fail (the previous loop always exited 0).
        success=0
        for i in {1..3}; do
          echo "Attempt $i of 3..."
          if python main.py; then
            success=1
            break
          fi
          echo "Attempt $i failed, waiting 30 seconds before retry..."
          sleep 30
        done
        if [ "$success" -ne 1 ]; then
          echo "ERROR: All crawler attempts failed"
          exit 1
        fi

    # Verhindert, dass GitHub den Schedule nach 60 Tagen Repo-Inaktivität
    # deaktiviert (z. B. über die Sommerpause): Der Enable-API-Aufruf setzt
    # den Inaktivitäts-Timer zurück.
    - name: Keep workflow alive
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api -X PUT "repos/${{ github.repository }}/actions/workflows/basketball-crawler.yml/enable" \
          && echo "Workflow keepalive refreshed" \
          || echo "WARNING: keepalive API call failed (insufficient permissions?)"

    - name: Notify on failure
      if: failure()
      env:
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      run: |
        echo "BasketballBund crawler failed at $(date)"
        if [ -n "$ALERT_WEBHOOK_URL" ]; then
          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 Pitbulls Stats Hub: Crawler-Lauf fehlgeschlagen! ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$ALERT_WEBHOOK_URL" || echo "Webhook notification failed"
        else
          echo "Set the ALERT_WEBHOOK_URL secret (Discord/Slack-compatible) to receive alerts."
        fi

  health-check:
    runs-on: ubuntu-latest
    needs: crawl
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r crawler/requirements.txt

    - name: Check recent data
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
      working-directory: ./crawler
      run: |
        echo "Starting health check..."
        if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
          echo "ERROR: Missing required environment variables"
          exit 1
        fi
        python health_check.py

    - name: Notify on failed health check
      if: failure()
      env:
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      run: |
        if [ -n "$ALERT_WEBHOOK_URL" ]; then
          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ Pitbulls Stats Hub: Health-Check fehlgeschlagen — seit >72h keine erfolgreichen Crawler-Daten. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$ALERT_WEBHOOK_URL" || echo "Webhook notification failed"
        fi
