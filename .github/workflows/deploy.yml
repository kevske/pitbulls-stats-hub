name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "temp-main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      # Quality gates: vite build prüft keine Typen — ohne diese Steps
      # wurden Typfehler unbemerkt deployt.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Lint (advisory)
        # Noch 50+ Bestandsfehler — vorerst nicht blockierend.
        # TODO: nach Lint-Bereinigung auf blockierend stellen.
        run: npm run lint || echo "::warning::ESLint reported issues (non-blocking)"

      - name: Build
        env:
          # Note: VITE_ADMIN_PASSWORD removed - now validated server-side via Edge Function
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm run build
          # Ensure .nojekyll is copied to the build output
          cp public/.nojekyll dist/
          # Copy 404.html to handle client-side routing
          cp 404.html dist/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
